services:
  ros-dev:
    image: technomancer-ros-dev:jazzy
    build:
      context: ..
      dockerfile: docker/Dockerfile.ros-dev
      args:
        BASE_IMAGE: technomancer-ros-base:jazzy
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
    volumes:
      - ../workspace:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

  turtlebot-demo:
    image: technomancer-ros-gazebo-cpu:jazzy-harmonic
    build:
      context: ..
      dockerfile: docker/Dockerfile.ros-gazebo-cpu
      args:
        BASE_IMAGE: technomancer-ros-dev:jazzy
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      - LIBGL_ALWAYS_SOFTWARE=1
    volumes:
      - ../demo:/workspace/demo:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: ["bash", "/workspace/demo/turtlebot/run-demo.sh"]

  ai-cpu:
    image: technomancer-ros-ai-cpu:jazzy
    build:
      context: ..
      dockerfile: docker/Dockerfile.ros-ai-cpu
      args:
        BASE_IMAGE: technomancer-ros-base:jazzy
    network_mode: host
    ipc: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
    volumes:
      - ../workspace:/workspace
