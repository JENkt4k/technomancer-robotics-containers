services:
  ros-dev:
    image: technomancer-ros-dev:jazzy
    build:
      context: ..
      dockerfile: docker/Dockerfile.ros-dev
      args:
        BASE_IMAGE: technomancer-ros-base:jazzy
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    volumes:
      - ../workspace:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

  gazebo:
    image: technomancer-ros-gazebo-nvidia:jazzy-harmonic
    build:
      context: ..
      dockerfile: docker/Dockerfile.ros-gazebo-nvidia
      args:
        BASE_IMAGE: technomancer-ros-dev:jazzy
    network_mode: host
    ipc: host
    privileged: true
    gpus: all
    environment:
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
    volumes:
      - ../workspace:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

  turtlebot-demo:
    image: technomancer-ros-gazebo-nvidia:jazzy-harmonic
    build:
      context: ..
      dockerfile: docker/Dockerfile.ros-gazebo-nvidia
      args:
        BASE_IMAGE: technomancer-ros-dev:jazzy
    network_mode: host
    ipc: host
    privileged: true
    gpus: all
    environment:
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    volumes:
      - ../demo:/workspace/demo:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: ["bash", "/workspace/demo/turtlebot/run-demo.sh"]

  ai-nvidia:
    image: technomancer-ros-ai-nvidia:jazzy-cuda
    build:
      context: ..
      dockerfile: docker/Dockerfile.ros-ai-nvidia
    network_mode: host
    ipc: host
    privileged: true
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
    volumes:
      - ../workspace:/workspace
